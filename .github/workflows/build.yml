name: Build and Deploy

on:
  push:
    tags:
      - "v*.*.*" # Only trigger on version tags like v1.0.0, v2.1.3, etc.

permissions:
  contents: write # Required to create and push branches

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up pnpm and Node.js environment
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Specify your Node.js version
          cache: "pnpm"

      # Step 3: Cache Next.js build
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      # Step 4: Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Step 5: Build the project
      - name: Build the project
        run: pnpm run build

      # Step 6: Deploy build contents to deploy branch
      - name: Deploy build to deploy branch
        env:
          TEST_GITHUB_TOKEN: ${{ secrets.TEST_GITHUB_TOKEN }}
        run: |
          # Configure Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Authenticate using TEST_GITHUB_TOKEN
          git remote set-url origin https://x-access-token:${TEST_GITHUB_TOKEN}@github.com/${{ github.repository }}

          # Move build directory out of the way before switching branches
          mv build ../deploy_build_output

          # Create or switch to the deploy branch
          git fetch origin
          if git rev-parse --verify origin/deploy; then
            git checkout deploy
            git pull origin deploy
          else
            git checkout --orphan deploy
          fi

          # Clean everything in the current branch
          git rm -rf . > /dev/null 2>&1 || true

          # Remove any leftover files not tracked by git
          rm -rf * .next node_modules public src

          # Copy everything from the saved build output (including dotfiles like .htaccess)
          cp -a ../deploy_build_output/. .

          # Clean up temporary directory
          rm -rf ../deploy_build_output

          # Add changes and commit if there are any
          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit"
          else
            BUILD_VERSION=$(date +'%Y.%m.%d.%H%M%S') # Timestamp for versioning
            git commit -m "Deploy build version $BUILD_VERSION"
            git push origin deploy --force
          fi
