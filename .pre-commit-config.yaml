default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: oxfmt
        name: Check formatting with oxfmt
        entry: pnpm exec oxfmt --check
        language: system
        types: [text]

      - id: oxlint
        name: Lint with oxlint
        entry: pnpm exec oxlint --config oxlint.json
        language: system
        types_or: [javascript, jsx, ts, tsx]

      - id: forbid-env-files
        name: Prevent committing environment files
        entry: scripts/check-no-env-files.sh
        language: script
        files: '(^|/)\.env($|\.)'
        exclude: '(^|/)\.env.*\.(example|sample|template)$'
